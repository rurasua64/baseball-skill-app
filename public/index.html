<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill FanGraphs - Detector MLB F5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚾ Skill FanGraphs Baseball</h1>
            <p>Detección de Discrepancias en F5 - Partidos del día</p>
        </header>

        <!-- Selector de fecha -->
        <div class="date-selector">
            <label>📅 Fecha:</label>
            <input type="date" id="fechaInput">
            <button id="cargarPartidosBtn" class="btn-small">🔄 Cargar partidos</button>
        </div>

        <!-- Lista de partidos del día -->
        <div id="partidosLista" class="partidos-lista">
            <h3>📋 Partidos del día</h3>
            <div id="listaContainer" class="lista-container">
                <div class="loading">Cargando partidos...</div>
            </div>
        </div>

        <!-- Resultado del análisis -->
        <div id="resultadoAnalisis" class="result hidden"></div>

        <!-- Instrucciones rápidas -->
        <div class="info-footer">
            <h4>📌 ¿Cómo actualizar los partidos?</h4>
            <p>Edita el archivo <strong>data/games.json</strong> con los datos de FanGraphs y haz push a GitHub.</p>
            <p>📊 wRC+ se obtiene de <a href="https://www.fangraphs.com/leaders/splits-leaderboards" target="_blank">FanGraphs Splits Leaderboard</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
